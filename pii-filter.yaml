name: PII Filter
shortDescription: Detect and redact sensitive PII in MCP messages and JSON payloads
description: |
  A Model Context Protocol (MCP) server for screening content for sensitive personally identifiable information (PII) using Microsoft Presidio.

  ## Features
  - **PII Detection**: Identifies sensitive entities in MCP messages and JSON-compatible payloads
  - **Automatic Redaction**: Returns redacted content when sensitive PII is found
  - **Nanobot Hook Compatibility**: Accepts Nanobot-style hook payloads and can return rewritten message objects
  - **Entity Reporting**: Includes all detected entities and the high-confidence sensitive subset in results
  - **Confidence Tuning**: Supports an adjustable confidence threshold for filtering

  ## What you'll need to connect

  No credentials are required.

  The server runs as a streamable HTTP MCP endpoint at `/mcp`.

metadata:
  categories: Security
repoURL: https://github.com/obot-platform/pii-filter
runtime: containerized
containerizedConfig:
  image: ghcr.io/obot-platform/pii-filter:v0.5.2
  port: 8080
  path: "/mcp"
systemMCPServerType: filter
filterConfig:
  toolName: filter_pii
env:
  - key: PII_BLOCK_TYPES
    name: PII Filter Types to Block
    description: Comma-separated list of PII entity types, and optionally threshold values, which will cause the message to be blocked. Threshold defaults to 0.8 if not provided. E.g. `EMAIL_ADDRESS,PHONE_NUMBER=0.6` would block messages container email addresses with confidence of 0.8 or higher, and phone numbers with a confidence of 0.6 or higher.
  - key: PII_REDACT_TYPES
    name: PII Filter Types to Redact
    description: Comma-separated list of PII entity types, and optionally threshold values, which will be redacted. Threshold defaults to 0.8 if not provided. E.g. `EMAIL_ADDRESS,PHONE_NUMBER=0.6` would redact email addresses with confidence of 0.8 or higher, and phone numbers with a confidence of 0.6 or higher.
toolPreview:
  - name: filter_pii
    description: Detect sensitive PII in a MCP messages and return a redacted message when needed.
    params:
      message: MCP message to inspect and redact
